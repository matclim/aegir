[workspace]
name = "aegir"
description = "Phlex-based simulation framework for the SHiP experiment"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
# SHiP/HEP packages (prefix.dev/ship + conda-forge)
shipdatamodel = "*"
shipgeometry = "*"
shipgeometryservice = "*"
field-service = "*"
phlex = ">=0.3.0"
root = ">=6.40"
# aegir/phlex are C++23 — pull the matching ROOT build variant.
root_cxx_standard = "==23"
geant4 = ">=11.3"
pythia8 = ">=8.3"
random123 = "*"
libjsonnet = "*"
ship-ci-metrics = "*"

# C++ libraries
libboost-devel = "*"
tbb-devel = "*"
spdlog = "*"
# Required transitively by GeoModelCore's CMake config (find_dependency(Eigen3 ...));
# declared explicitly because conda-forge geomodel-core does not list it as a runtime dep.
eigen = "*"

# Build tools
cmake = ">=3.27"
ninja = "*"
cxx-compiler = "*"

[activation]
scripts = ["activate.sh"]

[tasks]
configure = { cmd = """
cmake -S . -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
""" }
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
install = { cmd = "cmake --install build", depends-on = ["build"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }
smoke = { cmd = "scripts/smoke.sh", depends-on = ["build"] }
# Physics smoke: full Geant4 chain (100 events, deterministic seeding), then
# extract metrics from the validation histograms (see ci/metrics_config.yaml).
ci-physics-smoke = { cmd = "bash -c 'phlex -c <(jsonnet workflows/gun_st_nofield_smoke.jsonnet)'", depends-on = ["build"] }
ci-extract-metrics = "ship-metrics-extract . -o metrics-physics-smoke.json --pretty --config ci/metrics_config.yaml"
ci-render-plots = "ship-metrics-render gun_st_nofield_smoke_validation.root --output-dir plots/physics-smoke --job physics-smoke --config default"
clean = "rm -rf build"

[feature.bench.dependencies]
hyperfine = "*"
just = "*"
linux-perf = "*"

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
ruff = "*"
clang-format = "22.*"
codespell = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork). gersemi is standardised on 0.27.7
# (the version used by the other SHiP repos; aegir previously pinned 0.17.1).
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/pre-commit"
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/commit-msg"
'''

[environments]
default = { solve-group = "default" }
bench = { features = ["bench"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
